<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Anaglyph Text</title>
<style>
body{margin:0;background:#000;color:#fff;font-family: sans-serif;}
canvas{display:block;width:100vw;height:100vh;}
#controls{position:fixed;top:10px;left:10px;color:#fff;background:rgba(0,0,0,0.5);padding:10px;border-radius:8px;font-size:14px;font-family:monospace;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="controls">
text: <input id="txt" type="text" value="ANAGLYPH"><br>
separation: <input id="sep" type="range" min="0" max="0.1" step="0.001" value="0.03"><span id="sepVal">0.03</span>
</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();
let text=document.getElementById('txt').value;
document.getElementById('txt').addEventListener('input',(e)=>{text=e.target.value;});
const sepSlider=document.getElementById('sep');
const sepVal=document.getElementById('sepVal');
let separation=parseFloat(sepSlider.value);
sepSlider.addEventListener('input',()=>{
  separation=parseFloat(sepSlider.value);
  sepVal.textContent=separation.toFixed(3);
});
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.font=`bold ${Math.min(canvas.width,canvas.height)/4}px Sans-Serif`;
  const offset=separation*canvas.width*0.5;
  ctx.fillStyle='rgba(0,255,200,0.8)';
  ctx.fillText(text, canvas.width/2+offset, canvas.height/2);
  ctx.fillStyle='rgba(255,50,100,0.8)';
  ctx.fillText(text, canvas.width/2-offset, canvas.height/2);
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
