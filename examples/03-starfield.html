<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Anaglyph Starfield</title>
<style>
body,html{margin:0;background:#000;}
canvas{display:block;width:100vw;height:100vh;}
#controls{position:fixed;top:10px;left:10px;color:#fff;background:rgba(0,0,0,0.5);padding:10px;border-radius:8px;font-size:14px;font-family:monospace;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="controls">
star count: <input id="count" type="range" min="50" max="500" step="10" value="200"><span id="countVal">200</span><br>
depth range: <input id="depthRange" type="range" min="0" max="1" step="0.01" value="0.5"><span id="drVal">0.50</span><br>
separation: <input id="sep" type="range" min="0" max="0.05" step="0.001" value="0.02"><span id="sepVal">0.02</span>
</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();
const stars=[];
function generate(n){
  stars.length=0;
  for(let i=0;i<n;i++){
    stars.push({x:Math.random(), y:Math.random(), z:Math.random()});
  }
}
const countSlider=document.getElementById('count');
const countVal=document.getElementById('countVal');
generate(parseInt(countSlider.value));
countSlider.addEventListener('input',()=>{
  countVal.textContent=countSlider.value;
  generate(parseInt(countSlider.value));
});
const drSlider=document.getElementById('depthRange');
const drVal=document.getElementById('drVal');
let depthRange=parseFloat(drSlider.value);
drSlider.addEventListener('input',()=>{
  depthRange=parseFloat(drSlider.value);
  drVal.textContent=depthRange.toFixed(2);
});
const sepSlider=document.getElementById('sep');
const sepVal=document.getElementById('sepVal');
let separation=parseFloat(sepSlider.value);
sepSlider.addEventListener('input',()=>{
  separation=parseFloat(sepSlider.value);
  sepVal.textContent=separation.toFixed(3);
});
function draw(){
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{
    const size=1.5+3*(1-s.z);
    const offset=(s.z*2-1)*depthRange*separation*canvas.width;
    ctx.fillStyle='rgba(0,255,255,0.9)';
    ctx.beginPath();
    ctx.arc(s.x*canvas.width+offset, s.y*canvas.height, size, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle='rgba(255,80,100,0.9)';
    ctx.beginPath();
    ctx.arc(s.x*canvas.width-offset, s.y*canvas.height, size, 0, Math.PI*2);
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
