<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>anaglyph_stereo</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; overflow: hidden; background: #000; height: 100%; }
  canvas { display: block; width: 100vw; height: 100vh; }

  #panel {
    position: fixed;
    top: 12px;
    left: 12px;
    width: 280px;
    max-height: 96vh;
    overflow-y: auto;
    padding: 14px;
    background: rgba(10, 0, 20, 0.78);
    border: 1px solid rgba(255, 0, 110, 0.35);
    border-radius: 10px;
    color: #e8e2f4;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    backdrop-filter: blur(6px);
  }
  #panel h1 {
    margin: 0 0 8px;
    font-size: 14px;
    color: #ff006e;
    letter-spacing: 0.05em;
  }
  #panel .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin: 6px 0;
  }
  #panel label { flex: 0 0 92px; color: #9d8fc4; }
  #panel select, #panel input[type="file"] { flex: 1; background: #1a0033; color: #e8e2f4; border: 1px solid #4a2a6a; border-radius: 4px; }
  #panel input[type="range"] { flex: 1; }
  #panel .val { flex: 0 0 46px; text-align: right; color: #4cc9f0; }
  #panel button {
    width: 100%;
    margin-top: 4px;
    padding: 6px;
    background: linear-gradient(90deg, #8338ec, #ff006e);
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
  }
  #panel hr { border-color: #3a1a5a; margin: 10px 0; }
  #panel .check { display: flex; align-items: center; gap: 6px; }
</style>
</head>
<body>
<canvas id="glcanvas"></canvas>

<div id="panel">
  <h1>ANAGLYPH_STEREO</h1>

  <div class="row">
    <label for="preset">preset</label>
    <select id="preset">
      <option value="">custom</option>
      <option value="red_cyan_classic">red_cyan_classic</option>
      <option value="lenticular_ripple">lenticular_ripple</option>
      <option value="wiggle_gif">wiggle_gif</option>
      <option value="depth_glitch">depth_glitch</option>
    </select>
  </div>

  <div class="row">
    <label for="mode">mode</label>
    <select id="mode">
      <option value="anaglyph_dubois">anaglyph_dubois</option>
      <option value="anaglyph_color">anaglyph_color</option>
      <option value="lenticular">lenticular</option>
      <option value="wiggle">wiggle</option>
    </select>
  </div>

  <hr>

  <div class="row">
    <label for="separation">separation</label>
    <input id="separation" type="range" min="0" max="0.2" step="0.001" value="0.03">
    <span class="val" id="separationVal">0.030</span>
  </div>

  <div class="row">
    <label for="depthScale">depth_scale</label>
    <input id="depthScale" type="range" min="0" max="2" step="0.01" value="1.0">
    <span class="val" id="depthScaleVal">1.00</span>
  </div>

  <div class="row">
    <label for="depthSource">depth src</label>
    <select id="depthSource">
      <option value="sdf">sdf-scene</option>
      <option value="raymarch">raymarch</option>
      <option value="upload">upload</option>
    </select>
  </div>

  <div class="row" id="uploadDepthRow" style="display:none">
    <label for="depthFile">depth map</label>
    <input id="depthFile" type="file" accept="image/*">
  </div>

  <div class="row check">
    <input id="invertDepth" type="checkbox">
    <label for="invertDepth" style="flex:1">invert uploaded depth</label>
  </div>

  <hr>

  <div id="lenticularControls" style="display:none">
    <div class="row">
      <label for="viewCount">view_count</label>
      <input id="viewCount" type="range" min="2" max="16" step="1" value="8">
      <span class="val" id="viewCountVal">8</span>
    </div>
    <div class="row">
      <label for="angleDrive">angle_drive</label>
      <select id="angleDrive">
        <option value="mouse">mouse</option>
        <option value="time">time</option>
        <option value="gyro">gyro</option>
      </select>
    </div>
  </div>

  <div id="wiggleControls" style="display:none">
    <div class="row">
      <label for="oscSpeed">osc speed (Hz)</label>
      <input id="oscSpeed" type="range" min="0.5" max="12" step="0.1" value="6.0">
      <span class="val" id="oscSpeedVal">6.0</span>
    </div>
  </div>

  <hr>

  <div class="row">
    <label for="ghostBlur">ghost reduce</label>
    <input id="ghostBlur" type="range" min="0" max="1" step="0.01" value="0.3">
    <span class="val" id="ghostBlurVal">0.30</span>
  </div>

  <div class="row">
    <label for="chromatic">chromatic</label>
    <input id="chromatic" type="range" min="0" max="0.01" step="0.0001" value="0.0015">
    <span class="val" id="chromaticVal">0.0015</span>
  </div>

  <div class="row">
    <label for="glitch">glitch tear</label>
    <input id="glitch" type="range" min="0" max="1" step="0.01" value="0">
    <span class="val" id="glitchVal">0.00</span>
  </div>

  <hr>

  <div class="row">
    <label for="sourceFile">source img</label>
    <input id="sourceFile" type="file" accept="image/*">
  </div>

  <button id="webcamBtn">use webcam as source</button>

  <hr>

  <div class="row check">
    <input id="showDepth" type="checkbox">
    <label for="showDepth" style="flex:1">show depth map</label>
  </div>

  <div class="row">
    <label for="palette">depth palette</label>
    <select id="palette">
      <option value="acid">acid</option>
      <option value="void_bloom">void_bloom</option>
      <option value="plasma">plasma</option>
      <option value="mono">mono</option>
    </select>
  </div>
</div>

<script src="src/js/main.js" type="module"></script>
</body>
</html>
